<title>アイコンクリッカー</title>
<div style="text-align: center;">
  <h1>アイコンクリッカー
  </h1>
</div>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クリックカウンター</title>
    <style>
        .container { text-align: center; margin-top: 50px; }
        img { width: 200px; cursor: pointer; border: 2px solid #ccc; border-radius: 10px; }
        .count-display { font-size: 2rem; font-weight: bold; color: #ff4500; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com" alt="アイコン" onclick="countUp()">
    
    <div class="count-display">クリック数: <span id="counter">0</span></div>
</div>

<script>
    let count = 0;
    function countUp() {
        count++; 
        document.getElementById("counter").innerText = count;
    }
</script>

</body>
</html>
